{% extends "base.html" %}

{% block title %}Add expense — Spendly{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Add an expense</h1>
            <p class="auth-subtitle">Record what you spent</p>
        </div>

        <div class="auth-card">
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('add_expense') }}">
                <div class="form-group">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" name="amount"
                           class="form-input" step="0.01" min="0.01"
                           placeholder="0.00"
                           value="{{ amount|default('') }}"
                           required autofocus>
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input" required>
                        <option value="" disabled
                                {% if not category %}selected{% endif %}>Choose a category</option>
                        {% for c in CATEGORIES %}
                        <option value="{{ c }}"
                                {% if c == category %}selected{% endif %}>{{ c }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input"
                           value="{{ date|default(today) }}"
                           required>
                </div>
                <div class="form-group">
                    <label for="description">Description <span class="form-optional">(optional)</span></label>
                    <input type="text" id="description" name="description"
                           class="form-input" maxlength="200"
                           placeholder="What was it for?"
                           value="{{ description|default('') }}">
                </div>
                <button type="submit" class="btn-submit">Add expense</button>
            </form>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('profile') }}">← Back to profile</a>
        </p>

    </div>
</section>

{% endblock %}
